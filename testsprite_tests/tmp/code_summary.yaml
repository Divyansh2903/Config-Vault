version: "2"
type: backend
tech_stack:
  - TypeScript
  - Next.js 16
  - PostgreSQL
  - Prisma
  - bcrypt
  - AES-256-GCM
features:
  - name: Authentication API
    description: Login, register, logout, session, password reset
    files:
      - src/app/api/auth/login/route.ts
      - src/app/api/auth/register/route.ts
      - src/app/api/auth/logout/route.ts
      - src/app/api/auth/me/route.ts
      - src/app/api/auth/forgot-password/route.ts
      - src/app/api/auth/reset-password/route.ts
      - src/lib/auth/auth.ts
    endpoints:
      - method: POST
        path: /api/auth/login
        description: Sign in with email and password
        auth_required: false
        response_schema:
          "200": { ok: true }
          "400": { error: string }
          "401": { error: string }
      - method: POST
        path: /api/auth/register
        description: Create new user account. REQUIRED body fields are fullName, email, and password. Success returns 200 with { ok: true } (not 201). Session cookie is set automatically.
        auth_required: false
        request_schema:
          body:
            fullName: string
            email: string
            password: string
        response_schema:
          "200": { ok: true }
          "400": { error: "Invalid registration data." }
      - method: POST
        path: /api/auth/logout
        description: End session
        auth_required: true
        response_schema:
          "200": ok
      - method: GET
        path: /api/auth/me
        description: Get current user profile
        auth_required: true
        response_schema:
          "200": Profile
          "401": Unauthorized
      - method: POST
        path: /api/auth/forgot-password
        description: Request password reset email
        auth_required: false
        response_schema:
          "200": confirmation
          "400": validation error
      - method: POST
        path: /api/auth/reset-password
        description: Set new password with token
        auth_required: false
        response_schema:
          "200": ok
          "400": invalid token/validation
    depends_on: []
  - name: Projects API
    description: CRUD for configuration projects
    files:
      - src/app/api/projects/route.ts
      - src/app/api/projects/[projectId]/route.ts
      - src/app/api/projects/[projectId]/environments/route.ts
      - src/app/api/projects/[projectId]/environments/[envId]/route.ts
    endpoints:
      - method: POST
        path: /api/projects
        description: Create a new project with optional .env import
        auth_required: true
        response_schema:
          "201": Project
          "400": validation error
          "401": Unauthorized
      - method: GET
        path: /api/projects/[projectId]
        description: Get project by ID with environments
        auth_required: true
        response_schema:
          "200": Project
          "403": Forbidden
          "404": Not found
      - method: PATCH
        path: /api/projects/[projectId]
        description: Update project
        auth_required: true
        response_schema:
          "200": Project
          "403": Forbidden
          "404": Not found
      - method: DELETE
        path: /api/projects/[projectId]
        description: Delete project
        auth_required: true
        response_schema:
          "200": ok
          "403": Forbidden
          "404": Not found
      - method: POST
        path: /api/projects/[projectId]/environments
        description: Create environment (if custom envs added)
        auth_required: true
        response_schema:
          "201": Environment
      - method: DELETE
        path: /api/projects/[projectId]/environments/[envId]
        description: Delete environment
        auth_required: true
        response_schema:
          "200": ok
          "403": Forbidden
          "404": Not found
    depends_on:
      - Authentication API
  - name: Project Members API
    description: Team membership and roles
    files:
      - src/app/api/projects/[projectId]/members/route.ts
      - src/app/api/projects/[projectId]/members/[memberId]/route.ts
    endpoints:
      - method: POST
        path: /api/projects/[projectId]/members
        description: Invite or add member
        auth_required: true
        response_schema:
          "201": Member
          "403": Forbidden
          "404": Not found
      - method: PATCH
        path: /api/projects/[projectId]/members/[memberId]
        description: Update member role
        auth_required: true
        response_schema:
          "200": Member
          "403": Forbidden
          "404": Not found
      - method: DELETE
        path: /api/projects/[projectId]/members/[memberId]
        description: Remove member
        auth_required: true
        response_schema:
          "200": ok
          "403": Forbidden
          "404": Not found
    depends_on:
      - Authentication API
      - Projects API
  - name: Config Entries API
    description: Key-value config entries per environment
    files:
      - src/app/api/environments/[envId]/entries/route.ts
      - src/app/api/entries/[entryId]/route.ts
      - src/app/api/entries/[entryId]/reveal/route.ts
      - src/app/api/entries/[entryId]/rotate/route.ts
      - src/app/api/entries/[entryId]/duplicate/route.ts
    endpoints:
      - method: GET
        path: /api/environments/[envId]/entries
        description: List config entries for environment
        auth_required: true
        response_schema:
          "200": ConfigEntry[]
          "403": Forbidden
          "404": Not found
      - method: POST
        path: /api/environments/[envId]/entries
        description: Create config entry
        auth_required: true
        response_schema:
          "201": ConfigEntry
          "400": validation error
          "403": Forbidden
          "404": Not found
      - method: PATCH
        path: /api/entries/[entryId]
        description: Update config entry
        auth_required: true
        response_schema:
          "200": ConfigEntry
          "403": Forbidden
          "404": Not found
      - method: DELETE
        path: /api/entries/[entryId]
        description: Delete config entry
        auth_required: true
        response_schema:
          "200": ok
          "403": Forbidden
          "404": Not found
      - method: POST
        path: /api/entries/[entryId]/reveal
        description: Reveal secret value (if permitted)
        auth_required: true
        response_schema:
          "200": { value: string }
          "403": Forbidden
          "404": Not found
      - method: POST
        path: /api/entries/[entryId]/rotate
        description: Rotate secret value
        auth_required: true
        response_schema:
          "200": ConfigEntry
          "403": Forbidden
          "404": Not found
      - method: POST
        path: /api/entries/[entryId]/duplicate
        description: Duplicate entry to other environment(s)
        auth_required: true
        response_schema:
          "200": created entries
          "403": Forbidden
          "404": Not found
    depends_on:
      - Authentication API
      - Projects API
  - name: Environment Import/Export API
    description: Bulk .env import and export
    files:
      - src/app/api/environments/[envId]/import/route.ts
      - src/app/api/environments/[envId]/export/route.ts
    endpoints:
      - method: POST
        path: /api/environments/[envId]/import
        description: Bulk import entries from .env content
        auth_required: true
        response_schema:
          "200": import result
          "400": validation error
          "403": Forbidden
          "404": Not found
      - method: GET
        path: /api/environments/[envId]/export
        description: Export environment as .env
        auth_required: true
        response_schema:
          "200": text/plain .env
          "403": Forbidden
          "404": Not found
    depends_on:
      - Authentication API
      - Projects API
      - Config Entries API
  - name: Audit & Readiness API
    description: Audit logs and deployment readiness
    files:
      - src/app/api/projects/[projectId]/audit/route.ts
      - src/app/api/projects/[projectId]/readiness/route.ts
      - src/app/api/projects/[projectId]/duplicate-keys/route.ts
    endpoints:
      - method: GET
        path: /api/projects/[projectId]/audit
        description: List audit logs for project
        auth_required: true
        response_schema:
          "200": AuditLog[]
          "403": Forbidden
          "404": Not found
      - method: GET
        path: /api/projects/[projectId]/readiness
        description: Deployment readiness check
        auth_required: true
        response_schema:
          "200": readiness result
          "403": Forbidden
          "404": Not found
      - method: GET
        path: /api/projects/[projectId]/duplicate-keys
        description: Find keys with different values across environments
        auth_required: true
        response_schema:
          "200": duplicate key report
          "403": Forbidden
          "404": Not found
    depends_on:
      - Authentication API
      - Projects API
  - name: Share Links API
    description: Time-limited secret sharing
    files:
      - src/app/api/entries/[entryId]/share-links/route.ts
      - src/app/api/share-links/[shareLinkId]/revoke/route.ts
      - src/app/api/share/[token]/route.ts
    endpoints:
      - method: POST
        path: /api/entries/[entryId]/share-links
        description: Create share link for secret
        auth_required: true
        response_schema:
          "201": ShareLink
          "403": Forbidden
          "404": Not found
      - method: POST
        path: /api/share-links/[shareLinkId]/revoke
        description: Revoke share link
        auth_required: true
        response_schema:
          "200": ok
          "403": Forbidden
          "404": Not found
      - method: GET
        path: /api/share/[token]
        description: Resolve share token and return secret (public, view-limited)
        auth_required: false
        response_schema:
          "200": { value, key, etc }
          "404": expired or invalid
    depends_on:
      - Authentication API
      - Config Entries API
  - name: Invitations API
    description: Project invitation accept/decline
    files:
      - src/app/api/invitations/[token]/route.ts
    endpoints:
      - method: GET
        path: /api/invitations/[token]
        description: Get invitation details
        auth_required: false
        response_schema:
          "200": Invitation
          "404": invalid or expired
      - method: POST
        path: /api/invitations/[token]
        description: Accept or decline invitation
        auth_required: false
        response_schema:
          "200": ok
          "400": invalid
          "404": not found
    depends_on:
      - Projects API
  - name: AI Suggest Config
    description: AI-suggested config keys
    files:
      - src/app/api/ai/suggest-config/route.ts
    endpoints:
      - method: POST
        path: /api/ai/suggest-config
        description: Get AI suggestions for config keys
        auth_required: true
        response_schema:
          "200": suggestions
          "401": Unauthorized
    depends_on:
      - Authentication API
known_limitations:
  - issue: "Generated tests must send fullName in POST /api/auth/register body (required by API). Login tests should either use a user created via register (with fullName) or a pre-seeded test user."
    location: api/auth/register
    impact: "Tests that omit fullName get 400; tests that use non-existent credentials for login get 401."
